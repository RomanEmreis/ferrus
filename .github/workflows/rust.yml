name: Rust

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --locked -- -D warnings

      - name: Run tests
        run: cargo test --locked

  smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin_name: ferrus
          - os: macos-latest
            bin_name: ferrus
          - os: windows-latest
            bin_name: ferrus.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build debug binary
        run: cargo build --locked

      - name: Smoke test ferrus init
        shell: bash
        env:
          BIN_NAME: ${{ matrix.bin_name }}
        run: |
          set -euo pipefail
          repo_root="$PWD"
          bin_path="$repo_root/target/debug/$BIN_NAME"
          tmpdir="$(mktemp -d)"
          home_dir="$(mktemp -d)"
          home_native="$home_dir"
          if command -v cygpath >/dev/null 2>&1; then
            home_native="$(cygpath -w "$home_dir")"
          fi
          export HOME="$home_dir"
          export USERPROFILE="$home_native"

          "$bin_path" --version

          (
            cd "$tmpdir"
            "$bin_path" init
          )

          test -f "$tmpdir/ferrus.toml"
          test -f "$tmpdir/.ferrus/project.toml"
          test ! -f "$tmpdir/.ferrus/STATE.json"
          test -f "$tmpdir/.ferrus/STATE.lock"
          test -f "$tmpdir/.ferrus/agents.json"
          test -f "$tmpdir/.ferrus/CONSULT_TEMPLATE.md"
          test -f "$tmpdir/.ferrus/TASK.md"
          test -d "$tmpdir/.ferrus/tasks"
          test -d "$tmpdir/.ferrus/runs"
          test -d "$tmpdir/.agents/skills/ferrus"

          project_id="$(sed -n 's/^project_id = "\(.*\)"/\1/p' "$tmpdir/.ferrus/project.toml")"
          test -n "$project_id"
          test -f "$home_dir/.ferrus/projects/$project_id/project.toml"
          test -f "$home_dir/.ferrus/projects/$project_id/ferrus.db"
