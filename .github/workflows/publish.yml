name: Publish

on:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify formatting
        run: cargo fmt --check

      - name: Verify clippy
        run: cargo clippy --locked -- -D warnings

      - name: Verify tests
        run: cargo test --locked

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

  release-linux-binary:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release --target x86_64-unknown-linux-gnu

      - name: Package release archive
        env:
          TARGET: x86_64-unknown-linux-gnu
        run: |
          mkdir -p dist
          staging="dist/ferrus-${TARGET}"
          mkdir -p "${staging}"
          cp "target/${TARGET}/release/ferrus" "${staging}/ferrus"
          cp README.md LICENSE NOTICE "${staging}/"
          tar -C dist -czf "dist/ferrus-${TARGET}.tar.gz" "ferrus-${TARGET}"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/ferrus-x86_64-unknown-linux-gnu.tar.gz \
            install.sh \
            --clobber
