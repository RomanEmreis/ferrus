name: Publish

on:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify formatting
        run: cargo fmt --check

      - name: Verify clippy
        run: cargo clippy --locked -- -D warnings

      - name: Verify tests
        run: cargo test --locked

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

  release-binary:
    needs: publish
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs_on: ubuntu-latest
            archive: ferrus-x86_64-unknown-linux-gnu.tar.gz
            package_format: tar.gz
            linker: ""
            upload_installer: true
            installer_name: install.sh
          - target: aarch64-unknown-linux-gnu
            runs_on: ubuntu-latest
            archive: ferrus-aarch64-unknown-linux-gnu.tar.gz
            package_format: tar.gz
            linker: aarch64-linux-gnu-gcc
            upload_installer: false
            installer_name: install.sh
          - target: x86_64-apple-darwin
            runs_on: macos-13
            archive: ferrus-x86_64-apple-darwin.tar.gz
            package_format: tar.gz
            linker: ""
            upload_installer: false
            installer_name: install.sh
          - target: aarch64-apple-darwin
            runs_on: macos-14
            archive: ferrus-aarch64-apple-darwin.tar.gz
            package_format: tar.gz
            linker: ""
            upload_installer: false
            installer_name: install.sh
          - target: x86_64-pc-windows-msvc
            runs_on: windows-latest
            archive: ferrus-x86_64-pc-windows-msvc.zip
            package_format: zip
            linker: ""
            upload_installer: true
            installer_name: install.ps1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux cross toolchain
        if: ${{ matrix.runs_on == 'ubuntu-latest' && matrix.linker != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --locked --profile dist --target "${{ matrix.target }}"

      - name: Package Unix release archive
        if: ${{ matrix.package_format == 'tar.gz' }}
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          mkdir -p dist
          staging="dist/ferrus-${TARGET}"
          mkdir -p "${staging}"
          cp "target/${TARGET}/dist/ferrus" "${staging}/ferrus"
          cp README.md LICENSE NOTICE "${staging}/"
          tar -C dist -czf "dist/${ARCHIVE}" "ferrus-${TARGET}"
          (
            cd dist
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
            else
              shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
            fi
          )

      - name: Package Windows release archive
        if: ${{ matrix.package_format == 'zip' }}
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $staging = Join-Path "dist" "ferrus-$env:TARGET"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/$env:TARGET/dist/ferrus.exe" "$staging/ferrus.exe"
          Copy-Item README.md, LICENSE, NOTICE $staging
          Compress-Archive -Path "$staging/*" -DestinationPath "dist/$env:ARCHIVE" -Force
          $hash = (Get-FileHash "dist/$env:ARCHIVE" -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path "dist/$env:ARCHIVE.sha256" -Value "$hash  $env:ARCHIVE"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "dist/${{ matrix.archive }}" \
            "dist/${{ matrix.archive }}.sha256" \
            --clobber

      - name: Upload installer
        if: ${{ matrix.upload_installer }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ matrix.installer_name }}" \
            --clobber
