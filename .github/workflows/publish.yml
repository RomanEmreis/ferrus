name: Publish

on:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify formatting
        run: cargo fmt --check

      - name: Verify clippy
        run: cargo clippy --locked -- -D warnings

      - name: Verify tests
        run: cargo test --locked

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

  release-linux-binary:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            archive: ferrus-x86_64-unknown-linux-gnu.tar.gz
            linker: ""
            upload_installer: true
          - target: aarch64-unknown-linux-gnu
            archive: ferrus-aarch64-unknown-linux-gnu.tar.gz
            linker: aarch64-linux-gnu-gcc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux cross toolchain
        if: ${{ matrix.linker != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --locked --profile dist --target "${{ matrix.target }}"

      - name: Package release archive
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          mkdir -p dist
          staging="dist/ferrus-${TARGET}"
          mkdir -p "${staging}"
          cp "target/${TARGET}/dist/ferrus" "${staging}/ferrus"
          cp README.md LICENSE NOTICE "${staging}/"
          tar -C dist -czf "dist/${ARCHIVE}" "ferrus-${TARGET}"
          (
            cd dist
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          )

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "dist/${{ matrix.archive }}" \
            "dist/${{ matrix.archive }}.sha256" \
            --clobber

      - name: Upload installer
        if: ${{ matrix.upload_installer }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            install.sh \
            --clobber
