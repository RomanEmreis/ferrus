[package]
name = "ferrus"
version = "0.2.0-alpha.3"
edition = "2021"
license = "Apache-2.0"
description = "AI agent orchestrator - drives a Supervisor–Executor workflow for autonomous software development"

[[bin]]
name = "ferrus"
path = "src/main.rs"

[dependencies]
neva = { version = "0.2.9", features = ["server-full"] }
tokio = { version = "1.50.0", features = ["full"] }
clap = { version = "4.6.0", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1.0.149"
toml = "0.8.23"
anyhow = "1.0.102"
thiserror = "2.0.18"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
chrono = { version = "0.4.44", features = ["serde"] }
fs2 = "0.4.3"
rustyline = "17.0.2"
shlex = "1"
portable-pty = "0.9.0"
crossterm = "0.29.0"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"
