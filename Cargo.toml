[package]
name = "ferrus"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "AI orchestration MCP server — shared coordination layer for Supervisor + Executor agents"

[[bin]]
name = "ferrus"
path = "src/main.rs"

[dependencies]
neva = { version = "0.2", features = ["server-full"] }
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
chrono = { version = "0.4", features = ["serde"] }
